<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HueDiary — How do you feel today?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f4ede0;
      --paper-dark: #ebe2d0;
      --dot: #d4cdb7;
      --ink: #2c2724;
      --ink-soft: #5a544c;
      --note-yellow: #fbeec0;
      --note-yellow-tape: #b9d6e8;
      --note-blue: #cce8e6;
      --note-blue-tape: #f3c6dc;
      --circle-purple: #9580d8;
      --star-orange: #f0a042;
      --star-yellow: #f5d04a;
      --hash-red: #e85d5d;
      --bar-shadow: 0 6px 30px rgba(60, 50, 30, 0.08), 0 2px 8px rgba(60, 50, 30, 0.05);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--paper);
      background-image:
        radial-gradient(circle, var(--dot) 1.2px, transparent 1.6px);
      background-size: 22px 22px;
      color: var(--ink);
      font-family: 'Inter', 'PingFang HK', sans-serif;
      cursor: none;
      position: relative;
    }

    /* ─── 自定义鼠标指针 ─── */
    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      will-change: transform;
    }
    .cursor-dot {
      width: 6px; height: 6px;
      background: var(--ink);
      border-radius: 50%;
      transition: width 0.2s, height 0.2s, background 0.2s;
    }
    .cursor-ring {
      width: 32px; height: 32px;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      transition: width 0.25s, height 0.25s, border-color 0.25s, background 0.25s;
    }
    .cursor-ring.hover-cat {
      width: 64px; height: 64px;
      background: rgba(149, 128, 216, 0.12);
      border-color: var(--circle-purple);
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 56px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
      color: var(--ink);
    }
    .nav-logo img {
      width: 44px; height: 44px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(60, 50, 30, 0.12);
    }
    .nav-logo .name {
      font-family: 'Caveat', cursive;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 44px;
    }
    .nav-links a {
      color: var(--ink);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -4px;
      height: 2px;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s;
    }
    .nav-links a:hover::after { transform: scaleX(1); }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 40px;
    }

    /* 中央标题区 */
    .hero-center {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      transform: translateY(-20px);
    }
    .hero-bg-cat {
      --bg-size: min(1350px, 92vh, 95vw);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: var(--bg-size);
      height: var(--bg-size);
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }
    .hero-bg-cat.show {
      opacity: 0.75;
      transform: translate(-50%, -50%) scale(1);
    }
    .hero-title-1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 200px;
      line-height: 0.95;
      color: var(--ink);
      letter-spacing: -2px;
      position: relative;
      z-index: 2;
      user-select: none;
    }
    .hero-title-2 {
      font-family: 'Caveat', cursive;
      font-weight: 400;
      font-size: 76px;
      line-height: 1;
      color: var(--ink-soft);
      margin-top: -12px;
      position: relative;
      z-index: 2;
      user-select: none;
    }

    /* ─── 装饰贴纸 ─── */
    .sticker {
      position: absolute;
      user-select: none;
      pointer-events: none;
    }

    /* 左上：紫色圆圈装饰 */
    .sticker-circles {
      top: 30%; left: 6%;
      width: 110px; height: 130px;
    }
    .sticker-circles .c1 {
      position: absolute; top: 0; left: 28px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--circle-purple);
    }
    .sticker-circles .c2 {
      position: absolute; top: 38px; left: 0;
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 3px solid var(--circle-purple);
    }

    /* 左侧：黄色便利贴 */
    .sticker-paper {
      top: 56%; left: 4%;
      width: 230px; height: 165px;
      background: var(--note-yellow);
      transform: rotate(-3deg);
      box-shadow: 0 6px 18px rgba(60, 50, 30, 0.1);
      border-bottom-right-radius: 8px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 22px;
    }
    .sticker-paper::after {
      /* 撕痕底边 */
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 12px;
      background:
        radial-gradient(circle at 8% 100%, transparent 5px, var(--note-yellow) 5.5px) 0 0/16px 100%;
    }
    .sticker-paper-tape {
      position: absolute;
      top: 50%; left: 70%;
      transform: translate(-50%, -50%) rotate(-12deg);
      width: 90px; height: 24px;
      background: var(--note-yellow-tape);
      opacity: 0.85;
    }
    .sticker-paper-wrap {
      position: absolute;
      top: 56%; left: 4%;
      width: 230px; height: 180px;
      pointer-events: none;
    }
    .sticker-paper-wrap .sticker-paper {
      position: absolute;
      top: 18px; left: 0;
      transform: rotate(-3deg);
    }
    .sticker-paper-wrap .sticker-paper-tape {
      position: absolute;
      top: 4px; left: 80%;
      transform: translate(-50%, 0) rotate(-12deg);
    }

    /* 右上：星星装饰 */
    .sticker-stars {
      top: 25%; right: 6%;
      width: 120px; height: 120px;
    }
    .sticker-stars svg {
      position: absolute;
      width: 100%; height: 100%;
    }

    /* 右侧：蓝色便签（空白） */
    .sticker-todo-wrap {
      position: absolute;
      top: 60%; right: 4%;
      width: 200px; height: 220px;
      pointer-events: none;
    }
    .sticker-todo {
      position: absolute;
      top: 16px; left: 0;
      width: 200px; height: 200px;
      background: var(--note-blue);
      transform: rotate(4deg);
      box-shadow: 0 6px 18px rgba(60, 50, 30, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }
    .sticker-text {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      text-align: center;
      line-height: 1.25;
    }
    .sticker-todo-tape {
      position: absolute;
      top: 0; left: 50%;
      transform: translate(-50%, 0) rotate(-3deg);
      width: 90px; height: 22px;
      background: var(--note-blue-tape);
      opacity: 0.85;
    }

    /* 左下：井号 # */
    .sticker-hash {
      bottom: 22%; left: 28%;
      font-family: 'Caveat', cursive;
      font-size: 64px;
      font-weight: 700;
      color: var(--hash-red);
      transform: rotate(-8deg);
    }

    /* ─── 下载按钮（参考 Freenotes 白底胶囊样式） ─── */
    .download-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
      position: relative;
      z-index: 2;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 22px;
      background: #ffffff;
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      box-shadow: 0 4px 14px rgba(60, 50, 30, 0.08);
      transition: transform 0.25s cubic-bezier(.22,1,.36,1), box-shadow 0.25s;
    }
    .dl-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(60, 50, 30, 0.16);
    }
    .dl-icon {
      width: 28px; height: 28px;
      flex-shrink: 0;
    }
    .dl-text {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
      font-family: 'Inter', sans-serif;
    }
    .dl-tiny {
      font-size: 9px;
      opacity: 0.7;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 3px;
      font-weight: 500;
    }
    .dl-big {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    /* ─── 猫猫工具栏 ─── */
    .cat-bar-wrap {
      position: relative;
      width: 90vw;
      max-width: 520px;
      margin-top: 94px;
      z-index: 3;
    }
    .cat-bar {
      width: 100%;
      background: #ffffff;
      border-radius: 100px;
      padding: 5px 28px;
      box-shadow: var(--bar-shadow);
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    .cat-bar.dragging { cursor: grabbing; }
    .cat-bar::before, .cat-bar::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 40px;
      pointer-events: none;
      z-index: 2;
    }
    .cat-bar::before {
      left: 0;
      background: linear-gradient(to right, #fff, transparent);
      border-radius: 100px 0 0 100px;
    }
    .cat-bar::after {
      right: 0;
      background: linear-gradient(to left, #fff, transparent);
      border-radius: 0 100px 100px 0;
    }
    .cat-track {
      display: flex;
      gap: 20px;
      transition: transform 0.4s cubic-bezier(.22,1,.36,1);
      will-change: transform;
    }
    .cat-track.snapping { transition: transform 0.4s cubic-bezier(.22,1,.36,1); }
    .cat-track.dragging { transition: none; }
    .cat-item {
      flex-shrink: 0;
      width: 60px; height: 60px;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s cubic-bezier(.22,1,.36,1);
    }
    .cat-item img {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .cat-item:hover { transform: scale(1.5) translateY(-8px); }
    .cat-item.selected {
      transform: scale(1.1) translateY(-3px);
    }

    /* 拖拽提示 */
    .drag-hint {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--ink-soft);
      opacity: 0.6;
      letter-spacing: 1px;
      font-family: 'Caveat', cursive;
      font-size: 18px;
    }

    /* ─── FOOTER 备案号 ─── */
    footer {
      position: fixed;
      bottom: 12px; left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--ink-soft);
      opacity: 0.7;
      z-index: 50;
    }
    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--ink); }

    /* ─── 响应式（mobile 简单容下） ─── */
    @media (max-width: 900px) {
      body { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      nav { padding: 16px 20px; }
      .nav-logo .name { font-size: 26px; }
      .nav-links { gap: 18px; }
      .nav-links a { font-size: 13px; }
      .hero-title-1 { font-size: 100px; }
      .hero-title-2 { font-size: 40px; }
      .hero-bg-cat { width: 280px; height: 280px; }
      .sticker-circles, .sticker-paper-wrap, .sticker-stars, .sticker-todo-wrap, .sticker-hash { display: none; }
      .cat-item { width: 72px; height: 72px; }
      .cat-bar { padding: 16px 28px; }
      .cat-track { gap: 18px; }
    }
  </style>
</head>

<script>
  // ─── 自定义鼠标指针 ───
  const dot = document.getElementById('cursorDot');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  window.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
  });
  // ring 用 RAF 缓动跟随
  function animateRing() {
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
    requestAnimationFrame(animateRing);
  }
  animateRing();

  // ─── 猫猫点击：设置背景 ───
  const bgCat = document.getElementById('bgCat');
  const catItems = document.querySelectorAll('.cat-item');
  let dragging = false, dragStartX = 0, dragStartTx = 0, currentTx = 0, didDrag = false;
  const track = document.getElementById('catTrack');
  const bar = document.getElementById('catBar');

  catItems.forEach((item) => {
    item.addEventListener('mouseenter', () => ring.classList.add('hover-cat'));
    item.addEventListener('mouseleave', () => ring.classList.remove('hover-cat'));
    item.addEventListener('click', (e) => {
      // 防止拖拽误触发点击
      if (didDrag) { didDrag = false; return; }
      catItems.forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      const mood = item.dataset.mood;
      const img = item.querySelector('img');
      bgCat.src = img.src;
      bgCat.classList.add('show');
    });
  });

  // ─── 横向拖拽 ───
  function clampTx(tx) {
    // 计算 track 实际宽度 vs 容器宽度，限制拖拽范围
    const barWidth = bar.clientWidth - 88;          // 减 padding
    const trackWidth = track.scrollWidth;
    const minTx = Math.min(0, barWidth - trackWidth);
    return Math.max(minTx, Math.min(0, tx));
  }

  bar.addEventListener('mousedown', (e) => {
    dragging = true;
    didDrag = false;
    dragStartX = e.clientX;
    dragStartTx = currentTx;
    bar.classList.add('dragging');
    track.classList.add('dragging');
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    if (Math.abs(dx) > 5) didDrag = true;
    currentTx = clampTx(dragStartTx + dx);
    track.style.transform = `translateX(${currentTx}px)`;
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    bar.classList.remove('dragging');
    track.classList.remove('dragging');
  });

  // ─── 滚轮也能横向滑（macOS 双指） ───
  bar.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
      e.preventDefault();
      currentTx = clampTx(currentTx - e.deltaX);
      track.style.transform = `translateX(${currentTx}px)`;
    }
  }, { passive: false });

  // ─── 触摸支持（mobile） ───
  let touchStartX = 0, touchStartTx = 0;
  bar.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartTx = currentTx;
    track.classList.add('dragging');
  });
  bar.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - touchStartX;
    currentTx = clampTx(touchStartTx + dx);
    track.style.transform = `translateX(${currentTx}px)`;
  });
  bar.addEventListener('touchend', () => {
    track.classList.remove('dragging');
  });
</script>

</body>
</html>
